name: cydefine
channels:
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  - python=3.12.6
  - pip
  - pydantic>=2.6
  - pydantic-core>=2.16
  - git
  - make
  - sed
  - r-base=4.5.2
  - r-remotes
  - r-argparse
  - r-glue
  - r-data.table
  - r-readr
  - r-dplyr
  - r-jsonlite
  - r-ranger
  - r-tibble
  - r-stringr
  - r-tidyr
  - r-ggplot2
  - r-rcolorbrewer
  - r-igraph
  - r-pbmcapply
  - r-matrixcalc
  - r-magrittr
  - r-kohonen
  - r-readxl
  - bioconductor-sva
  - bioconductor-flowcore
  - pip:
      - "omnibenchmark==0.3.2"
      - "snakemake==9.14.8"
      - "linkml-runtime"
      - "curies"
      - "prefixmaps"
      - "prefixcommons"
