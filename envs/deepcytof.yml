name: deepcytof
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - conda-forge::python=3.11
  - conda-forge::pip
  - conda-forge::numpy=1.23.5
  - conda-forge::scipy=1.10.1
  - conda-forge::pandas=1.5.3
  - conda-forge::scikit-learn=1.2.2
  - conda-forge::matplotlib=3.7.2
  - conda-forge::h5py=3.8.0
  - conda-forge::pyyaml=6.0.3
  - conda-forge::pydantic=2.8.2
  - conda-forge::pydantic-core=2.20.1
  - conda-forge::typing_extensions=4.12.2
  - pip:
      - tensorflow-rocm
      - typing_extensions>=4.6
      - fcsparser==0.2.8
